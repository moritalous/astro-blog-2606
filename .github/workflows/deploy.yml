name: Deploy to GitHub Pages

on:
  # デフォルトブランチへのpush時にデプロイ
  push:
    branches: [claude/astro-7-gh-pages-6mv707]
  # Actionsタブから手動実行も可能
  workflow_dispatch:

# GITHUB_TOKENにPagesへデプロイする権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 進行中の実行をキャンセルせず、1つずつデプロイ
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
